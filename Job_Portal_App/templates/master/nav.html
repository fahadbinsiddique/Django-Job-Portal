<section>
  <nav class="navbar navbar-expand-lg navbar-light mask-custom shadow-0">
    <div class="container">
      <a class="navbar-brand" href="#!"><span style="color: #5e9693;">Job</span><span style="color: #4842c7;">Portal</span></a>
      <button class="navbar-toggler" type="button" data-mdb-collapse-init data-mdb-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><i class="fas fa-bars"></i></button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link 
            {% if request.path == '/' %}
              active
            {% endif %}
              " href="{% url 'home_page' %}">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link {% if request.path == '/job-list/' %}
              active
            {% endif %}" href="{% url 'job_list' %}">All Job</a>
          </li>

          <li class="nav-item">
            <a class="nav-link {% if request.path == '/register/' %}
              active
            {% endif %}" href="{% url 'register_page' %}">Register</a>
          </li>

          {% if request.user.is_authenticated %}
            <li class="nav-item">
              <a class="nav-link {% if request.path == '/profile/' %}
              active
            {% endif %}" href="{% url 'profile_page' %}">My Profile</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'logout_page' %}">Logout</a>
            </li>
          {% else %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'login_page' %}">Login</a>
            </li>
          {% endif %}
        </ul>
      </div>

      {% if request.path == '/job-list/' or request.path == '/' %}
        <form method="GET" class="form-inline my-2 my-lg-0">
          <input class="form-control mr-sm-2" type="search" placeholder="Search" name="search" aria-label="Search" />
          <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
        </form>
      {% endif %}
    </div>
  </nav>
  <!-- Navbar -->
</section>
