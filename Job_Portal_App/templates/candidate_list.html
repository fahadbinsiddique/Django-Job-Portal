
{% extends 'master/base.html' %}

{% block blockname %}
  <h1>HOME</h1>
  <div class="container mt-4">
   <h3 class="mb-3">File List</h3>
   <table class="table table-striped table-hover">
       <thead class="table-dark">
           <tr>
               <th>#</th>
               <th>Name</th>
               <th>Image</th>
               <th>Resume</th>
               <th>Applied Date</th>
               <th>Actions</th>
           </tr>
       </thead>
       <tbody>
        
        {% for data  in candidate_data %}
            
      
            
           <tr>
               <td>{{forloop.counter}}</td>
               <td>{{data.applied_by.seeker.display_name}}</td>
               <td><img src="{{data.applied_by.profile_picture.url}}" alt="" width="50px"></td>
               <td><a href="{{data.resume.url}}" target="_blank">Resume</a></td>
               <td>{{data.applied_at}}</td>
               <td>
                   <button class="btn btn-primary btn-sm">Download</button>
                   <button class="btn btn-danger btn-sm">Delete</button>
               </td>
           </tr>
             {% endfor %}
           <!-- Add more rows dynamically -->
       </tbody>
   </table>
</div>
{% endblock %}
